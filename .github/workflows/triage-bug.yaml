name: Start Coder Agent Chat

permissions:
  issues: write

on:
  issue_comment:
    types: [created]

jobs:
  trigger-on-comment:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '@coder-contrib-bot')
    steps:
      - name: Coder Create Agent Chat
        uses: coder/create-agent-chat-action@main
        with:
          coder-url: ${{ secrets.CODER_URL }}
          coder-token: ${{ secrets.CODER_TOKEN }}
          coder-organization: "coder"
          chat-prompt: "Spin up a workspace from the 'memorycard' template in the 'coder' organization using the latest template version. Then use the gh CLI to read ${{ github.event.issue.html_url }}, write an appropriate plan for solving the issue to PLAN.md, and then wait for feedback."
          github-user-id: ${{ github.event.sender.id }}
          github-issue-url: ${{ github.event.issue.html_url }}
          github-token: ${{ github.token }}
          comment-on-issue: true
