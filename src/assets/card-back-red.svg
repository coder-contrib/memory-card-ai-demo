<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#c41e3a"/>

  <!-- Border -->
  <rect x="4" y="4" width="92" height="92" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Pattern -->
  <defs>
    <pattern id="diamondPattern" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M10,0 L20,10 L10,20 L0,10 Z" fill="none" stroke="#fff" stroke-width="1"/>
      <path d="M10,5 L15,10 L10,15 L5,10 Z" fill="#fff"/>
    </pattern>
  </defs>

  <!-- Pattern Fill -->
  <rect x="4" y="4" width="92" height="92" fill="url(#diamondPattern)"/>

  <!-- Corner Decorations -->
  <path d="M4,4 L15,4 L15,15 L4,15 Z" fill="#c41e3a" stroke="#fff" stroke-width="1"/>
  <path d="M85,4 L96,4 L96,15 L85,15 Z" fill="#c41e3a" stroke="#fff" stroke-width="1"/>
  <path d="M4,85 L15,85 L15,96 L4,96 Z" fill="#c41e3a" stroke="#fff" stroke-width="1"/>
  <path d="M85,85 L96,85 L96,96 L85,96 Z" fill="#c41e3a" stroke="#fff" stroke-width="1"/>
</svg>